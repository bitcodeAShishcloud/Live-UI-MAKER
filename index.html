<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Live Code Compiler Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-bolt"></i>
            <span>Live Compiler Pro</span>
        </div>
        
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>Auto-run: 1s</span>
            <div class="auto-run-indicator">
                <i class="fas fa-play"></i>
                <span>Active</span>
            </div>
        </div>
        
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="clearAll()">
                <i class="fas fa-trash"></i>
                <span class="ml-5">Clear</span>
            </button>
            <button class="btn btn-primary" onclick="runCode()">
                <i class="fas fa-play"></i>
                <span class="ml-5">Run</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <div class="left-sidebar" id="leftSidebar">
            <nav class="activity-bar" id="activityBar">
                <button class="activity-btn active" id="activityFilesBtn" onclick="switchSidebarTab('files')" title="Files">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M10 4 8 6H4v12h16V8h-8l-2-4z"/>
                    </svg>
                </button>
                <button class="activity-btn" id="activityImportBtn" onclick="switchSidebarTab('import')" title="Import File">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6zm1 7V4.5L18.5 10H15zm-3 8-4-4h2.5v-3h3v3H16l-4 4z"/>
                    </svg>
                </button>
            </nav>

            <!-- Sidebar Panel -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-panel active" id="filesPanel">
                    <div class="sidebar-header">
                        <span><i class="fas fa-folder"></i> Files</span>
                    </div>
                    
                    <div class="file-tabs" id="fileTabs">
                        <!-- File sections will be generated here -->
                    </div>
                    
                    <button class="add-file-btn" id="addFileBtn" onclick="openAddFileModal()">
                        <i class="fas fa-plus"></i>
                        <span>New File</span>
                    </button>
                </div>

                <div class="sidebar-panel" id="importPanel">
                    <div class="sidebar-header">
                        <span>
                            <svg class="inline-import-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6zm1 7V4.5L18.5 10H15zm-3 8-4-4h2.5v-3h3v3H16l-4 4z"/>
                            </svg>
                            Import File
                        </span>
                    </div>

                    <div class="import-panel-content">
                        <p>Import local files and add them to your editor workspace.</p>
                        <button class="btn btn-primary import-file-btn" onclick="openImportPicker()">
                            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6zm1 7V4.5L18.5 10H15zm-3 8-4-4h2.5v-3h3v3H16l-4 4z"/>
                            </svg>
                            <span class="ml-5">Import File</span>
                        </button>
                        <small>Supports text-based files: html, css, js, py, json, md and more.</small>
                    </div>
                </div>
            </aside>
        </div>

        <input class="hidden-input" type="file" id="importFileInput" title="Import files" aria-label="Import files" multiple onchange="importFiles(event)">

        <div class="sidebar-resizer" id="sidebarResizer"></div>

        <!-- Editor Area -->
        <div class="editor-area">
            <div class="editor-tabs" id="editorTabs">
                <!-- Editor tabs will be generated here -->
            </div>
            <div class="editor-content" id="editorContent">
                <!-- Code editors will be generated here -->
            </div>
        </div>

        <!-- Resizer -->
        <div class="resizer" id="resizer"></div>

        <!-- Preview Area -->
        <div class="preview-area" id="previewArea">
            <div class="preview-header">
                <div class="preview-title">
                    <i class="fas fa-eye"></i>
                    <span>Preview</span>
                </div>
                <div class="preview-actions">
                    <button onclick="togglePreviewArea()" title="Toggle Preview (Ctrl+Shift+P)">
                        <i class="fas fa-eye" id="previewToggleIcon"></i>
                    </button>
                    <button onclick="refreshPreview()" title="Refresh (F5)">
                        <i class="fas fa-sync"></i>
                    </button>
                    <button onclick="openInNewTab()" title="Open in New Tab">
                        <i class="fas fa-external-link-alt"></i>
                    </button>
                    <button onclick="toggleConsole()" title="Toggle Console">
                        <i class="fas fa-terminal"></i>
                    </button>
                </div>
            </div>
            <iframe class="preview-frame" id="previewFrame" title="Live preview"></iframe>
            
            <!-- Console Panel -->
            <div class="console-panel" id="consolePanel">
                <div class="console-header">
                    <div class="console-title">
                        <i class="fas fa-terminal"></i>
                        <span>Console</span>
                    </div>
                    <div class="console-actions">
                        <button onclick="clearConsole()">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                        <button type="button" onclick="toggleConsole()" title="Toggle Console">
                            <i class="fas fa-chevron-down" id="consoleToggleIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="console-output" id="consoleOutput">
                    <!-- Console logs will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add File Modal -->
    <div class="modal-overlay" id="addFileModal">
        <div class="modal">
            <h3><i class="fas fa-file-circle-plus"></i> Create New File</h3>
            
            <label>File Name</label>
            <input type="text" id="newFileName" placeholder="e.g., app, script, main">
            
            <label>File Type</label>
            <div class="file-type-grid" id="fileTypeGrid">
                <!-- Web Development -->
                <div class="file-type-option" data-type="html" onclick="selectFileType('html')">
                    <i class="fab fa-html5" style="color: var(--html-color);"></i>
                    <span>HTML</span>
                </div>
                <div class="file-type-option" data-type="css" onclick="selectFileType('css')">
                    <i class="fab fa-css3-alt" style="color: var(--css-color);"></i>
                    <span>CSS</span>
                </div>
                <div class="file-type-option" data-type="js" onclick="selectFileType('js')">
                    <i class="fab fa-js" style="color: var(--js-color);"></i>
                    <span>JavaScript</span>
                </div>
                
                <!-- Backend & Others -->
                <div class="file-type-option" data-type="python" onclick="selectFileType('python')">
                    <i class="fab fa-python" style="color: var(--python-color);"></i>
                    <span>Python</span>
                </div>
                <div class="file-type-option" data-type="react" onclick="selectFileType('react')">
                    <i class="fab fa-react" style="color: var(--react-color);"></i>
                    <span>React</span>
                </div>
                <div class="file-type-option" data-type="node" onclick="selectFileType('node')">
                    <i class="fab fa-node-js" style="color: var(--node-color);"></i>
                    <span>Node.js</span>
                </div>
                
                <!-- System Languages -->
                <div class="file-type-option" data-type="c" onclick="selectFileType('c')">
                    <i class="fas fa-c" style="color: var(--c-color);"></i>
                    <span>C</span>
                </div>
                <div class="file-type-option" data-type="cpp" onclick="selectFileType('cpp')">
                    <i class="fas fa-code" style="color: var(--cpp-color);"></i>
                    <span>C++</span>
                </div>
                <div class="file-type-option" data-type="csharp" onclick="selectFileType('csharp')">
                    <i class="fas fa-code" style="color: var(--csharp-color);"></i>
                    <span>C#</span>
                </div>
                
                <!-- More Languages -->
                <div class="file-type-option" data-type="java" onclick="selectFileType('java')">
                    <i class="fab fa-java" style="color: var(--java-color);"></i>
                    <span>Java</span>
                </div>
                <div class="file-type-option" data-type="json" onclick="selectFileType('json')">
                    <i class="fas fa-brackets-curly" style="color: var(--warning);"></i>
                    <span>JSON</span>
                </div>
                <div class="file-type-option" data-type="markdown" onclick="selectFileType('markdown')">
                    <i class="fab fa-markdown" style="color: var(--text-primary);"></i>
                    <span>Markdown</span>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeAddFileModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createNewFile()">Create File</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
